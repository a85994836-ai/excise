<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
            🌓
        </button>
        <h1>Lotto Number Generator</h1>
        <div class="numbers-container"></div>
        <button class="generate-btn">Generate Numbers</button>
    </div>

    <div class="container contact-container">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/xojyvavv" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your Name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="_replyto" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required placeholder="How can we help?"></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
